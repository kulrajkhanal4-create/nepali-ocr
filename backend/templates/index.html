<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nepali OCR</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    min-height: 100vh;
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  h1 { font-size: 2rem; margin-bottom: 5px; color: #f8fafc; text-align: center; }
  p.sub { color: #94a3b8; margin-bottom: 24px; text-align: center; }

  .tabs {
    display: flex;
    gap: 10px;
    margin-bottom: 24px;
  }
  .tab {
    padding: 10px 28px;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    cursor: pointer;
    background: #1e293b;
    color: #94a3b8;
    transition: 0.2s;
  }
  .tab.active { background: #6366f1; color: white; }

  .panel { display: none; }
  .panel.active { display: flex; gap: 40px; flex-wrap: wrap; justify-content: center; }

  /* Character panel */
  .canvas-box { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  canvas {
    border: 3px solid #334155;
    border-radius: 12px;
    background: #1e293b;
    cursor: crosshair;
  }
  .buttons { display: flex; gap: 10px; }
  button.action {
    padding: 10px 24px;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    cursor: pointer;
    transition: 0.2s;
  }
  .btn-predict { background: #6366f1; color: white; }
  .btn-predict:hover { background: #4f46e5; }
  .btn-clear   { background: #334155; color: #e2e8f0; }
  .btn-clear:hover { background: #475569; }

  .results-box {
    background: #1e293b;
    border-radius: 12px;
    padding: 24px;
    min-width: 260px;
    border: 1px solid #334155;
  }
  .results-box h2 { margin-bottom: 16px; color: #c7d2fe; font-size: 1.1rem; }
  .result-item { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .char { font-size: 2.2rem; width: 50px; text-align: center; color: #f1f5f9; }
  .bar-wrap { flex: 1; }
  .bar-label { font-size: 0.8rem; color: #94a3b8; margin-bottom: 4px; }
  .bar-bg { background: #0f172a; border-radius: 4px; height: 10px; }
  .bar-fill { height: 10px; border-radius: 4px; background: #6366f1; transition: width 0.5s; }
  #topResult { font-size: 5rem; text-align: center; margin-bottom: 8px; color: #a5b4fc; min-height: 80px; }
  #hint { color: #64748b; font-size: 0.85rem; text-align: center; margin-top: 10px; }

  /* Word panel */
  .word-box {
    background: #1e293b;
    border-radius: 12px;
    padding: 30px;
    min-width: 400px;
    border: 1px solid #334155;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .word-box h2 { color: #c7d2fe; font-size: 1.1rem; }
  .word-input {
    display: flex;
    gap: 10px;
  }
  input[type=text] {
    flex: 1;
    padding: 10px 16px;
    border-radius: 8px;
    border: 2px solid #334155;
    background: #0f172a;
    color: #f1f5f9;
    font-size: 1.2rem;
  }
  input[type=text]:focus { outline: none; border-color: #6366f1; }
  #wordResult {
    font-size: 3rem;
    text-align: center;
    color: #a5b4fc;
    min-height: 60px;
    padding: 10px;
  }
  #wordImage {
    border-radius: 8px;
    border: 1px solid #334155;
    display: none;
    width: 100%;
  }
  #wordHint { color: #64748b; font-size: 0.85rem; text-align: center; }
</style>
</head>
<body>

<h1>🔤 Nepali OCR</h1>
<p class="sub">Character recognition + Word recognition powered by Deep Learning</p>

<div class="tabs">
  <button class="tab active" onclick="showTab('char')">✏️ Draw Character</button>
  <button class="tab"        onclick="showTab('word')">📝 Read Word</button>
</div>

<!-- Character Panel -->
<div class="panel active" id="charPanel">
  <div class="canvas-box">
    <canvas id="canvas" width="280" height="280"></canvas>
    <div class="buttons">
      <button class="action btn-predict" id="predictBtn">Predict</button>
      <button class="action btn-clear"   id="clearBtn">Clear</button>
    </div>
    <p id="hint">Draw one character and click Predict</p>
  </div>
  <div class="results-box">
    <div id="topResult">?</div>
    <h2>Top 5 Predictions</h2>
    <div id="results"></div>
  </div>
</div>

<!-- Word Panel -->
<div class="panel" id="wordPanel">
  <div class="word-box">
    <h2>Type a Nepali word — CRNN will read it</h2>
    <div class="word-input">
      <input type="text" id="wordInput" placeholder="नेपाल" />
      <button class="action btn-predict" onclick="predictWord()">Read</button>
    </div>
    <img id="wordImage" />
    <div id="wordResult">?</div>
    <p id="wordHint">Type any Nepali word and click Read</p>
  </div>
</div>

<script>
  // ── Tab switching ──────────────────────────────────────────
  function showTab(tab) {
    document.querySelectorAll('.tab').forEach((t,i) => {
      t.classList.toggle('active', (tab==='char' && i===0) || (tab==='word' && i===1));
    });
    document.getElementById('charPanel').classList.toggle('active', tab==='char');
    document.getElementById('wordPanel').classList.toggle('active', tab==='word');
  }

  // ── Canvas drawing ─────────────────────────────────────────
  const canvas = document.getElementById('canvas');
  const ctx    = canvas.getContext('2d');
  let drawing  = false;

  ctx.strokeStyle = '#f1f5f9';
  ctx.lineWidth   = 16;
  ctx.lineCap     = 'round';
  ctx.lineJoin    = 'round';

  canvas.addEventListener('mousedown', e => { drawing=true; ctx.beginPath(); ctx.moveTo(...pos(e)); });
  canvas.addEventListener('mousemove', e => { if(!drawing) return; ctx.lineTo(...pos(e)); ctx.stroke(); });
  canvas.addEventListener('mouseup',   () => drawing=false);
  canvas.addEventListener('mouseleave',() => drawing=false);
  canvas.addEventListener('touchstart', e => { e.preventDefault(); drawing=true; ctx.beginPath(); ctx.moveTo(...pos(e.touches[0])); });
  canvas.addEventListener('touchmove',  e => { e.preventDefault(); if(!drawing) return; ctx.lineTo(...pos(e.touches[0])); ctx.stroke(); });
  canvas.addEventListener('touchend',   () => drawing=false);

  function pos(e) {
    const r = canvas.getBoundingClientRect();
    return [e.clientX-r.left, e.clientY-r.top];
  }

  document.getElementById('clearBtn').onclick = () => {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    document.getElementById('results').innerHTML = '';
    document.getElementById('topResult').textContent = '?';
    document.getElementById('hint').textContent = 'Draw one character and click Predict';
  };

  document.getElementById('predictBtn').onclick = async () => {
    const image = canvas.toDataURL('image/png');
    document.getElementById('hint').textContent = 'Predicting...';
    const res  = await fetch('/predict_char', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({image})
    });
    const data = await res.json();
    const preds = data.predictions;
    document.getElementById('topResult').textContent = preds[0].char;
    document.getElementById('hint').textContent = `Confidence: ${preds[0].confidence}%`;
    document.getElementById('results').innerHTML = preds.map(p => `
      <div class="result-item">
        <div class="char">${p.char}</div>
        <div class="bar-wrap">
          <div class="bar-label">${p.confidence}%</div>
          <div class="bar-bg"><div class="bar-fill" style="width:${p.confidence}%"></div></div>
        </div>
      </div>`).join('');
  };

  // ── Word prediction ────────────────────────────────────────
  async function predictWord() {
    const word = document.getElementById('wordInput').value.trim();
    if (!word) return;
    document.getElementById('wordHint').textContent = 'Reading...';
    document.getElementById('wordResult').textContent = '...';
    const res  = await fetch('/predict_word', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({word})
    });
    const data = await res.json();
    document.getElementById('wordResult').textContent = data.prediction;
    document.getElementById('wordHint').textContent = 'CRNN prediction';
    const imgEl = document.getElementById('wordImage');
    imgEl.src     = 'data:image/png;base64,' + data.image;
    imgEl.style.display = 'block';
  }

  document.getElementById('wordInput').addEventListener('keypress', e => {
    if (e.key === 'Enter') predictWord();
  });
</script>
</body>
</html>
